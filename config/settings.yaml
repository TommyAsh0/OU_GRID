# ====================================================================
# OU 均值回复动态网格交易策略 —— 全局配置文件
# 对应 README 阶段 1.3「配置文件模板」
#
# 说明：
#   所有可调参数集中在此文件，便于统一管理与回测调参。
#   修改本文件即可改变策略行为，无需改动源代码。
#   各参数含义详见 README 附录 B「参数速查表」。
# ====================================================================

strategy:
  name: "OU均值回复网格"
  version: "1.0.0"

# -------------------- 数据相关 --------------------
data:
  market: "A-share"          # 市场：A 股
  frequency: "daily"         # 频率：日线
  lookback_years: 5          # 回看年数
  # 数据区间需覆盖一轮 Walk-Forward：训练(3y)+验证(1y)+测试(1y)=5 年。
  # 这里取 2019-01-01 ~ 2024-12-31（6 年）留出 MA/ATR 暖机余量。
  start_date: "2019-01-01"   # 数据起始日期
  end_date: "2024-12-31"     # 数据结束日期
  # 本地缓存目录（相对项目根目录）。已下载的数据会缓存为 CSV，避免重复请求 Tushare。
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  results_dir: "data/results"

# -------------------- 技术指标 --------------------
indicators:
  ma_length: 60              # MA 均线周期（网格中轴）
  atr_length: 20             # ATR 周期（网格间距基准）

# -------------------- OU 参数估计 --------------------
ou_estimation:
  window: 250                # 滚动估计窗口（交易日）
  step: 20                   # 滚动步长（交易日）

# -------------------- 标的筛选阈值 --------------------
screening:
  adf_pvalue: 0.05           # ADF 检验阈值（< 0.05 拒绝单位根 → 平稳）
  kpss_pvalue: 0.10          # KPSS 检验阈值（> 0.10 不拒绝平稳）
  hurst_upper: 0.45          # Hurst 指数上界（< 0.45 → 均值回复）
  half_life_min: 5           # 最小半衰期（交易日）
  half_life_max: 20          # 最大半衰期（交易日）
  kappa_cv_max: 0.5          # κ 变异系数上界（< 0.5 → κ 稳定）
  min_turnover: 100000000    # 最小日均成交额（1 亿元，流动性过滤）
  min_listed_days: 250       # 最少上市交易日数（剔除次新股）

# -------------------- 网格引擎 --------------------
grid:
  n_layers: 5                # 网格层数
  K: 1.0                     # ATR 倍数（初始值 / 默认值）
  K_candidates: [0.5, 0.8, 1.0, 1.2, 1.5]  # 验证集上待选的 K 值
  position_mode: "equal"     # 仓位方案："equal"（等权）或 "linear"（线性递增）
  max_depth_sigma: 2.5       # 最大网格深度（稳态标准差的倍数）

# -------------------- 交易成本 --------------------
cost:
  commission: 0.00025        # 佣金（单边万 2.5）
  stamp_tax: 0.0005          # 印花税（仅卖出时收取）
  slippage: 0.0005           # 滑点估计（单边万 5）
  transfer_fee: 0.00001      # 过户费（沪市，万 0.1）

# -------------------- 风控 --------------------
risk:
  single_stop_loss: -0.15    # 单标的止损线（浮亏 -15% → 清仓）
  strategy_reduce: -0.15     # 策略减半线（总回撤 -15% → 仓位减半）
  strategy_stop: -0.20       # 策略清仓线（总回撤 -20% → 全部清仓）
  annual_stop: -0.25         # 年度止损线（年度累计亏损 -25% → 当年停止）
  cooldown_days: 30          # 清仓后冷却天数
  max_single_weight: 0.20    # 单标的最大占比（20% × 总资金）
  max_strategy_weight: 0.50  # 策略总仓位上限（50% × 总资金）
  cash_reserve: 0.30         # 永久现金储备（30% × 总资金）
  max_active_symbols: 5      # 同时运行的标的数上限

# -------------------- Regime 检测 --------------------
regime:
  hurst_window: 60           # 滚动 Hurst 窗口
  hurst_trend_threshold: 0.55  # Hurst 趋势阈值（> 0.55 → 趋势 → 暂停）
  hurst_mr_threshold: 0.45     # Hurst 均值回复阈值（< 0.45 → 正常）
  adf_window: 120            # 滚动 ADF 窗口
  adf_reject_threshold: 0.10 # ADF 拒绝阈值（p > 0.10 → 暂停）
  vol_spike_ratio: 2.0       # 波动率爆发阈值（ATR_5/ATR_60 ≥ 2.0 → 暂停）
  vol_warn_ratio: 1.5        # 波动率警告阈值（≥ 1.5 → 减半）
  recover_days: 5            # 恢复运行所需连续正常天数

# -------------------- 回测 --------------------
backtest:
  initial_capital: 1000000   # 初始资金（100 万元）
  train_years: 3             # 训练集年数（筛选标的 + 估计参数）
  validation_years: 1        # 验证集年数（选择 K）
  test_years: 1              # 测试集年数（最终评估）
  risk_free_rate: 0.025      # 无风险利率（用于 Sharpe，2.5%）
  trading_days_per_year: 252 # 每年交易日数（年化用）
